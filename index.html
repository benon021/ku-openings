<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KU OPEN TOURNAMENT</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Exact NCHA Palette */
            --background: 222 47% 6%;
            --foreground: 210 20% 95%;
            --card: 222 40% 10%;
            --card-foreground: 210 20% 95%;
            --primary: 25 95% 53%;
            --primary-foreground: 0 0% 100%;
            --muted: 222 30% 16%;
            --muted-foreground: 215 15% 55%;
            --accent: 168 70% 42%;
            --destructive: 0 72% 51%;
            --border: 222 20% 18%;
            
            --gradient-hero: linear-gradient(135deg, hsl(222 47% 6%), hsl(222 40% 14%));
            --gradient-card: linear-gradient(145deg, hsl(222 40% 10%), hsl(222 40% 8%));
            --shadow-glow: 0 0 30px hsla(25, 95%, 53%, 0.15);
            --radius: 0.625rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
        }

        a { text-decoration: none; color: inherit; }
        button { font-family: inherit; cursor: pointer; border: none; outline: none; background: transparent; }

        /* --- Top Navigation --- */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: hsl(var(--background) / 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid hsl(var(--border));
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 2rem;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: hsl(var(--foreground));
        }

        .nav-logo svg {
            color: hsl(var(--primary));
            width: 24px;
            height: 24px;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: hsl(var(--muted-foreground));
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            transition: all 0.2s;
        }

        .nav-link svg {
            width: 16px;
            height: 16px;
        }
        
        .nav-link:hover {
            color: hsl(var(--foreground));
        }

        .nav-link.active {
            color: hsl(var(--primary-foreground));
            background-color: hsl(var(--primary));
        }

        .login-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.875rem;
            transition: opacity 0.2s;
        }
        
        .login-btn:hover {
            opacity: 0.9;
        }

        /* Responsive Nav (for mobile hides links) */
        @media (max-width: 768px) {
            .nav-links {
                display: none; /* simple workaround for now */
            }
            .mobile-bottom-nav {
                display: flex !important;
            }
        }

        /* --- Main Layout --- */
        #app-root {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 64px);
        }

        /* --- Utilities --- */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: hsl(var(--border) / 0.5);
        }

        .hero-gradient {
            background: var(--gradient-hero);
            box-shadow: var(--shadow-glow);
        }

        .card-gradient {
            background: var(--gradient-card);
        }

        /* Typography */
        .text-gradient {
            background: linear-gradient(135deg, hsl(25 95% 53%), hsl(15 90% 48%));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
            color: hsl(var(--foreground));
        }

        /* --- Modals --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay:not(.hidden) { display: flex; }
        
        .modal-content {
            background-color: hsl(var(--background));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px; right: 16px;
            color: hsl(var(--muted-foreground));
            background: none;
        }

        /* Forms */
        .form-input {
            width: 100%;
            background-color: hsl(var(--muted));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .form-input:focus {
            outline: 2px solid hsl(var(--primary));
            outline-offset: -1px;
        }

        .btn-full {
            width: 100%;
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 8px;
        }

        .hidden { display: none !important; }

        /* specific to the new layout */
        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background-color: hsl(var(--background) / 0.95);
            backdrop-filter: blur(8px);
            border-top: 1px solid hsl(var(--border));
            padding: 0.5rem;
            justify-content: space-around;
            align-items: center;
            z-index: 50;
        }
    </style>
</head>
<body>

    <!-- Top Navigation (Desktop) -->
    <nav class="top-nav">
        <a href="#/" class="nav-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            KU OPEN
        </a>
        <div class="nav-links" id="desktop-links">
            <a href="#/" class="nav-link active" id="nav-item-hub">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </a>
            <a href="#/matches" class="nav-link" id="nav-item-matches">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Fixtures
            </a>
            <a href="#/standings" class="nav-link" id="nav-item-standings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
                Standings
            </a>
            <a href="#/knockouts" class="nav-link" id="nav-item-knockouts">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"></path><path d="M13 19l6-6"></path><path d="M16 16l4 4"></path><path d="M19 21l2-2"></path></svg>
                Knockout
            </a>
            <a href="#/stats" class="nav-link" id="nav-item-stats">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                Top Scorers
            </a>
            <a href="#/control" class="nav-link hidden" id="nav-item-control">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                Control
            </a>
        </div>
        <div style="display:flex; align-items:center; gap: 12px;">
            <div id="auth-status">
                <button onclick="router.openLogin()" class="login-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Login
                </button>
            </div>
        </div>
    </nav>

    <!-- App Root for Views -->
    <main id="app-root"></main>

    <!-- Mobile Nav (Visible only on small screens) -->
    <nav class="mobile-bottom-nav" id="mobile-links">
        <a href="#/" class="nav-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
        <a href="#/matches" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></a>
        <a href="#/standings" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg></a>
        <a href="#/knockouts" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"></path><path d="M13 19l6-6"></path><path d="M16 16l4 4"></path><path d="M19 21l2-2"></path></svg></a>
        <a href="#/stats" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg></a>
        <a href="#/control" class="nav-link hidden" id="mobile-nav-item-control"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg></a>
    </nav>

    <!-- Modal Container -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="modal-close" onclick="router.closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            <div id="modal-port"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/mock.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/views.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
