<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KU Open Tournament 2026</title>
    <link rel="icon" type="image/png" href="assets/logo.jpeg">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Exact NCHA Palette */
            --background: 222 47% 6%;
            --foreground: 210 20% 95%;
            --card: 222 40% 10%;
            --card-foreground: 210 20% 95%;
            --primary: 25 95% 53%;
            --primary-foreground: 0 0% 100%;
            --muted: 222 30% 16%;
            --muted-foreground: 215 15% 55%;
            --accent: 168 70% 42%;
            --destructive: 0 72% 51%;
            --border: 222 20% 18%;

            --gradient-hero: linear-gradient(135deg, hsl(222 47% 6%), hsl(222 40% 14%));
            --gradient-card: linear-gradient(145deg, hsl(222 40% 10%), hsl(222 40% 8%));
            --shadow-glow: 0 0 30px hsla(25, 95%, 53%, 0.15);
            --radius: 0.625rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Outfit', sans-serif;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            outline: none;
            background: transparent;
        }

        /* --- Top Navigation --- */
        .top-nav {
            position: sticky;
            top: 1rem;
            margin: 0 auto;
            width: 95%;
            max-width: 1200px;
            z-index: 50;
            background: rgba(20, 20, 24, 0.65);
            /* Translucent Crystal */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            /* macOS semi-round */
            padding: 0.5rem 1rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 4px 12px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .nav-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .desktop-links {
            display: none;
        }

        @media (min-width: 768px) {
            .desktop-links {
                display: flex;
                background: rgba(0, 0, 0, 0.4);
                border: 1px solid rgba(255, 255, 255, 0.05);
                /* inner border */
                border-radius: 14px;
                /* macOS style inner element */
                padding: 4px;
                gap: 4px;
                align-items: center;
            }
        }

        .nav-item {
            text-decoration: none;
            color: hsl(var(--muted-foreground));
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .nav-item:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            /* Hover glass */
        }

        .nav-item.active {
            color: hsl(var(--primary));
            background: hsl(var(--primary) / 0.15);
            /* Orange active glow */
        }

        .app-content {
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Mobile Nav Link Styles (Sync with desktop aesthetic) */
        .nav-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            color: hsl(var(--muted-foreground));
            border-radius: 9999px;
            transition: all 0.2s ease;
        }

        .nav-link svg {
            width: 20px;
            height: 20px;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            /* Hover glass */
        }

        .nav-link.active {
            color: hsl(var(--primary));
            background: hsl(var(--primary) / 0.15);
            /* Orange active glow */
        }

        .login-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.875rem;
            transition: opacity 0.2s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        /* Responsive Nav (for mobile hides links) */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                /* simple workaround for now */
            }

            .mobile-bottom-nav {
                display: flex !important;
            }
        }

        /* --- Main Layout --- */
        #app-root {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 64px);
        }

        /* --- Utilities --- */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: hsl(var(--border) / 0.5);
        }

        .hero-gradient {
            background: var(--gradient-hero);
            box-shadow: var(--shadow-glow);
        }

        .card-gradient {
            background: var(--gradient-card);
        }

        /* Typography */
        .text-gradient {
            background: linear-gradient(135deg, hsl(25 95% 53%), hsl(15 90% 48%));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
            color: hsl(var(--foreground));
        }

        /* --- Modals --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay:not(.hidden) {
            display: flex;
        }

        .modal-content {
            background-color: hsl(var(--background));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 400px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .modal-content.map-fullscreen {
            max-width: 100%;
            width: 100%;
            height: 100%;
            border-radius: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .modal-content.map-fullscreen #directions-map {
            flex: 1;
            aspect-ratio: unset;
        }

        /* Autocomplete dropdown */
        .places-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(20, 20, 30, 0.97);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0 0 10px 10px;
            z-index: 200;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .places-dropdown-item {
            padding: 10px 14px;
            font-size: 0.82rem;
            color: hsl(var(--foreground));
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
        }
        .places-dropdown-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .places-dropdown-item svg {
            flex-shrink: 0;
            color: hsl(var(--muted-foreground));
        }
        .places-dropdown-item span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.4); }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            color: hsl(var(--muted-foreground));
            background: none;
        }

        /* Forms */
        .form-input {
            width: 100%;
            background-color: hsl(var(--muted));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .form-input:focus {
            outline: 2px solid hsl(var(--primary));
            outline-offset: -1px;
        }

        @keyframes color-cycle {

            0%,
            19.99% {
                color: #ff3300;
            }

            /* Blaze Orange */
            20%,
            39.99% {
                color: #ff00aa;
            }

            /* Hot Pink */
            40%,
            59.99% {
                color: #bd00ff;
            }

            /* Toxic Purple */
            60%,
            79.99% {
                color: #00f0ff;
            }

            /* Neon Cyan */
            80%,
            100% {
                color: #00ff66;
            }

            /* Acid Green */
        }

        @keyframes tremble-explode {
            0% {
                transform: translate(0, 0) scale(1);
                box-shadow: 0 0 0 transparent;
            }

            10% {
                transform: translate(-0.5px, 0.5px) scale(1.002);
            }

            20% {
                transform: translate(0.5px, -0.5px) scale(0.998);
            }

            30% {
                transform: translate(-1px, 1px) scale(1.005);
            }

            40% {
                transform: translate(1px, -1px) scale(0.995);
            }

            50% {
                transform: translate(-1.5px, 1.5px) scale(1.01);
            }

            60% {
                transform: translate(1.5px, -1.5px) scale(0.99);
            }

            70% {
                transform: translate(-2px, 2px) scale(1.02);
            }

            74% {
                transform: translate(2.5px, -2.5px) scale(0.97);
            }

            76% {
                transform: translate(-3.5px, -2px) scale(1.03);
            }

            77% {
                transform: translate(3px, 3px) scale(0.96);
            }

            /* SINGLE SOLID EXPLOSION BLAST */
            78% {
                transform: translate(0, 0) scale(1.2);
                box-shadow: 0 0 80px currentColor;
                /* Uses dynamic color from color-cycle */
                border-radius: 50%;
            }

            /* FADE AND RESET */
            100% {
                transform: translate(0, 0) scale(1);
                box-shadow: 0 0 0 transparent;
            }
        }

        @keyframes emit-wave {
            0% {
                transform: scale(1);
                opacity: 0;
                background-color: currentColor;
            }

            77% {
                transform: scale(1);
                opacity: 0;
                background-color: currentColor;
            }

            78% {
                transform: scale(1.1);
                opacity: 0.85;
                background-color: currentColor;
            }

            100% {
                transform: scale(4.0);
                opacity: 0;
                background-color: currentColor;
            }
        }

        .wave-beacon {
            position: relative;
            z-index: 1;
            display: inline-flex;
            border-radius: 50%;
            color: #ff3300;
            /* Initial color matches first step of color-cycle */
            animation: tremble-explode 6.5s infinite ease-in-out, color-cycle 32.5s infinite linear;
        }

        .wave-beacon::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: inherit;
            background-color: hsl(var(--primary));
            z-index: -1;
            animation: emit-wave 6.5s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .btn-full {
            width: 100%;
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 8px;
        }

        .hidden {
            display: none !important;
        }

        /* specific to the new layout */
        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            border-radius: 9999px;
            background: rgba(20, 20, 24, 0.85);
            /* Slightly darker glass */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            justify-content: space-around;
            align-items: center;
            z-index: 50;
            box-shadow: 0 10px 32px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>

            <!-- Profile/Command -->
            <div id="auth-status" style="display:flex; align-items:center; gap:8px;">
                <button onclick="router.openLogin()" class="pill-badge"

                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
